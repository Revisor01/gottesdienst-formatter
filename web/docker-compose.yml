version: '3.8'

services:
  gottesdienst-formatter:
    build: .
    container_name: gottesdienst-formatter
    ports:
      - "5001:5000"
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=false
      - SECRET_KEY=${SECRET_KEY}
      - CHURCHDESK_ORG_IDS=${CHURCHDESK_ORG_IDS}
      - CHURCHDESK_ORG_2596_NAME=${CHURCHDESK_ORG_2596_NAME}
      - CHURCHDESK_ORG_2596_TOKEN=${CHURCHDESK_ORG_2596_TOKEN}
      - CHURCHDESK_ORG_6572_NAME=${CHURCHDESK_ORG_6572_NAME}
      - CHURCHDESK_ORG_6572_TOKEN=${CHURCHDESK_ORG_6572_TOKEN}
      - CHURCHDESK_ORG_2719_NAME=${CHURCHDESK_ORG_2719_NAME}
      - CHURCHDESK_ORG_2719_TOKEN=${CHURCHDESK_ORG_2719_TOKEN}
      - CHURCHDESK_ORG_2725_NAME=${CHURCHDESK_ORG_2725_NAME}
      - CHURCHDESK_ORG_2725_TOKEN=${CHURCHDESK_ORG_2725_TOKEN}
      - CHURCHDESK_ORG_2729_NAME=${CHURCHDESK_ORG_2729_NAME}
      - CHURCHDESK_ORG_2729_TOKEN=${CHURCHDESK_ORG_2729_TOKEN}
      - CHURCHDESK_ORG_2596_DESCRIPTION=${CHURCHDESK_ORG_2596_DESCRIPTION:-}
      - CHURCHDESK_ORG_6572_DESCRIPTION=${CHURCHDESK_ORG_6572_DESCRIPTION:-}
      - CHURCHDESK_ORG_2719_DESCRIPTION=${CHURCHDESK_ORG_2719_DESCRIPTION:-}
      - CHURCHDESK_ORG_2725_DESCRIPTION=${CHURCHDESK_ORG_2725_DESCRIPTION:-}
      - CHURCHDESK_ORG_2729_DESCRIPTION=${CHURCHDESK_ORG_2729_DESCRIPTION:-}